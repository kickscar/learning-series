<svg width="100%" viewBox="0 0 910 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c8c7c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── 구분선 ── -->
  <line x1="20" y1="100" x2="700" y2="100" stroke="#a3a1b7" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="20" y1="220" x2="700" y2="220" stroke="#a3a1b7" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="20" y1="340" x2="700" y2="340" stroke="#a3a1b7" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- ── Layer 레이블 ── -->
  <text x="730" y="55"  font-size="12" fill="#a3a1b7" font-family="Arial, sans-serif">Layer 3: Architecture &amp; Design</text>
  <text x="730" y="166" font-size="12" fill="#a3a1b7" font-family="Arial, sans-serif">Layer 2: IaC</text>
  <text x="730" y="286" font-size="12" fill="#a3a1b7" font-family="Arial, sans-serif">Layer 1: Core</text>
  <text x="730" y="385" font-size="12" fill="#a3a1b7" font-family="Arial, sans-serif">Layer 0: Fundamentals</text>

  <!-- ── Layer 3: Architecture ── -->
  <!-- y=14, height=72, bottom=86, 하단여백=100-86=14 ✓ -->
  <rect x="160" y="14" width="460" height="72" rx="7" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="390" y="45" font-size="12" font-weight="bold" fill="#712B13" text-anchor="middle" font-family="Arial, sans-serif">Cloud Infrastructure Architecture &amp; Design</text>
  <text x="390" y="65" font-size="11" fill="#993C1D" text-anchor="middle" font-family="Arial, sans-serif">설계 철학 / 멀티클라우드 트레이드오프</text>

  <!-- ── Layer 2: Azure IaC + GCP IaC ── -->
  <!-- y=114 (100+14), height=92, bottom=206, 하단여백=220-206=14 ✓ -->
  <rect x="272" y="114" width="210" height="92" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="377" y="152" font-size="12" font-weight="bold" fill="#0C447C" text-anchor="middle" font-family="Arial, sans-serif">Azure IaC with Terraform</text>
  <text x="377" y="172" font-size="10" fill="#185FA5" text-anchor="middle" font-family="Arial, sans-serif">Azure CLI / SDK 예제 / 도구(Terraform) 기본</text>
  <text x="377" y="190" font-size="10" fill="#185FA5" text-anchor="middle" font-family="Arial, sans-serif">플랫폼(Azure) 중심·심화</text>

  <rect x="496" y="114" width="210" height="92" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="601" y="152" font-size="12" font-weight="bold" fill="#085041" text-anchor="middle" font-family="Arial, sans-serif">GCP IaC with Terraform</text>
  <text x="601" y="172" font-size="10" fill="#0F6E56" text-anchor="middle" font-family="Arial, sans-serif">GCP CLI / SDK 예제 / 도구(Terraform) 기본</text>
  <text x="601" y="190" font-size="10" fill="#0F6E56" text-anchor="middle" font-family="Arial, sans-serif">플랫폼(GCP) 중심·심화</text>

  <!-- ── AWS IaC Core: Layer 1&2 경계선 ── -->
  <rect x="44" y="154" width="210" height="142" rx="7" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="149" y="210" font-size="13" font-weight="bold" fill="#633806" text-anchor="middle" font-family="Arial, sans-serif">AWS IaC Core</text>
  <text x="149" y="232" font-size="10" fill="#854F0B" text-anchor="middle" font-family="Arial, sans-serif">AWS CLI / SDK 예제</text>
  <text x="149" y="248" font-size="10" fill="#854F0B" text-anchor="middle" font-family="Arial, sans-serif">도구(CloudFormation) 중심·심화</text>
  <text x="149" y="264" font-size="10" fill="#854F0B" text-anchor="middle" font-family="Arial, sans-serif">플랫폼(AWS) 중심·심화</text>

  <!-- ── Layer 1: Terraform Core ── -->
  <!-- y=234 (220+14), height=92, bottom=326, 하단여백=340-326=14 ✓ -->
  <rect x="272" y="234" width="434" height="92" rx="7" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="489" y="273" font-size="12" font-weight="bold" fill="#3C3489" text-anchor="middle" font-family="Arial, sans-serif">Terraform Core</text>
  <text x="489" y="293" font-size="10" fill="#534AB7" text-anchor="middle" font-family="Arial, sans-serif">도구(Terraform) 중심·심화 / 보편적 플랫폼(AWS) 실습</text>

  <!-- ── Layer 0: Fundamentals ── -->
  <!-- y=354 (340+14), height=72, bottom=426, 상단여백=14 ✓ -->
  <rect x="44"  y="354" width="196" height="72" rx="7" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="142" y="384" font-size="12" font-weight="bold" fill="#633806" text-anchor="middle" font-family="Arial, sans-serif">AWS Fundamentals</text>
  <text x="142" y="402" font-size="10" fill="#854F0B" text-anchor="middle" font-family="Arial, sans-serif">콘솔 / 핵심 서비스 / 개념</text>

  <rect x="256" y="354" width="196" height="72" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="354" y="384" font-size="12" font-weight="bold" fill="#0C447C" text-anchor="middle" font-family="Arial, sans-serif">Azure Fundamentals</text>
  <text x="354" y="402" font-size="10" fill="#185FA5" text-anchor="middle" font-family="Arial, sans-serif">콘솔 / 핵심 서비스 / 개념</text>

  <rect x="468" y="354" width="238" height="72" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="587" y="384" font-size="12" font-weight="bold" fill="#085041" text-anchor="middle" font-family="Arial, sans-serif">GCP Fundamentals</text>
  <text x="587" y="402" font-size="10" fill="#0F6E56" text-anchor="middle" font-family="Arial, sans-serif">콘솔 / 핵심 서비스 / 개념</text>

  <!-- ── 점선 참조 화살표 ── -->
  <!-- 1a. TF Core → Azure IaC (아래로) -->
  <line x1="377" y1="208" x2="415" y2="230" stroke="#c8c7c0" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>
  <!-- 1b. TF Core → GCP IaC (아래로) -->
  <line x1="595" y1="208" x2="560" y2="230" stroke="#c8c7c0" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>
  <text x="428" y="218" font-size="9" fill="#c8c7c0" text-anchor="middle" font-family="Arial, sans-serif">TF Core 참조</text>
  <text x="624" y="218" font-size="9" fill="#c8c7c0" text-anchor="middle" font-family="Arial, sans-serif">TF Core 참조</text>

  <!-- 2. TF Core → AWS Fundamentals (아래로, 실습 플랫폼 참조) -->
  <path d="M 310 300 Q 180 330 142 354" fill="none" stroke="#c8c7c0" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>
  <text x="172" y="316" font-size="9" fill="#c8c7c0" font-family="Arial, sans-serif">실습 플랫폼 참조</text>

</svg>
