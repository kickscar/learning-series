AWSTemplateFormatVersion: 2010-09-09
Description: gallery-cloudwatch Deployment

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing Key Pair Name for SSH

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI ID (Use SSM Parameter Path to Find Latest Amazon Linux)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where Resources will be Deployed

  SshSourceCidr:
    Type: String
    Description: CIDR Allowed to SSH Port 22

  EnvType:
    Type: String
    Default: lab
    AllowedValues: [development, production, lab]
    Description: Deployment Environment

  AZ:
    Type: String
    Description: the Logical AZ Number for the Main Subnet.
    Default: AZ1
    AllowedValues: [ AZ1, AZ2, AZ3, AZ4 ]

Mappings:
  RegionMap:
    ap-northeast-1:
      AZ1: ap-northeast-1a
      AZ2: ap-northeast-1b
      AZ3: ap-northeast-1c
      AZ4: ap-northeast-1d
    ap-northeast-2:
      AZ1: ap-northeast-2a
      AZ2: ap-northeast-2b
      AZ3: ap-northeast-2c
      AZ4: ap-northeast-2d

  InstanceMap:
    lab:
      Type: t3.micro
    development:
      Type: t3.micro
    production:
      Type: t3.small

  ConfigMap:
    Constants:
      SourceUrl: https://github.com/kickscar/series-aws-apps/archive/refs/heads/main.tar.gz
      SourceCodeDir: /opt/app/series-aws-apps-main/gallery-cloudwatch
      ApplicationName: gallery-cloudwatch

Conditions:
  IsDevelopmentEnv: !Equals [!Ref EnvType, development]

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EC2(Instance) SSH Access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshSourceCidr
        - IpProtocol: tcp
          FromPort: !If [IsDevelopmentEnv, "8080", "80"]
          ToPort: !If [IsDevelopmentEnv, "8080", "80"]
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Project
          Value: !Ref "AWS::StackName"
        - Key: Environment
          Value: !Ref EnvType
        - Key: Capability
          Value: "SecurityGroup"

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub
        - "/${ApplicationNameReplace}/${EnvType}"
        - ApplicationNameReplace: !Join [ "/", !Split [ "-", !FindInMap [ ConfigMap, Constants, ApplicationName ] ] ]
      RetentionInDays: 30

  ErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LogGroup
      FilterPattern: "{$.severity = \"ERROR\"}"
      MetricTransformations:
        - MetricValue: "1"
          MetricName: "AppErrorCount"
          MetricNamespace: !Sub
            - "${ApplicationName}/metrics/application"
            - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]

  ErrorNotiTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "application-error-noti-topic-${AWS::StackName}"
      Subscription:
        - Protocol: email
          Endpoint: "kickscar@gmail.com"

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "application-error-alarm-${AWS::StackName}"
      AlarmDescription: "Triggers when the Application Logs Contain ERROR messages."
      Namespace: !Sub
        - "${ApplicationName}/metrics/application"
        - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
      MetricName: "ApplicationErrorCount"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ErrorNotiTopic
      OKActions:
        - !Ref ErrorNotiTopic

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub
        - "Dashboard-${ApplicationName}"
        - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "metric",
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/EC2", "CPUUtilization", "InstanceId", "${Instance}"]
                  ],
                  "period": 60,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "EC2 CPU Utilization"
                }
              },
              {
                "type": "metric",
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    ["${SystemMetricsNameSpace}", "mem_used_percent", "InstanceId", "${Instance}"]
                  ],
                  "period": 60,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "Memory Utilization (%)"
                }
              },
              {
                "type": "metric",
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    ["AWS/EC2", "NetworkIn", "InstanceId", "${Instance}"],
                    [".", "NetworkOut", ".", "."]
                  ],
                  "period": 60,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Network In / Out"
                }
              },
              {
                "type": "log",
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "SOURCE '${LogGroup}' | fields @timestamp, @message | sort @timestamp desc | limit 20",
                  "region": "${AWS::Region}",
                  "title": "Gallery Application Logs (Recent)"
                }
              }
            ]
          }
        - SystemMetricsNameSpace: !Sub
          - "${ApplicationName}/metrics/system"
          - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ ec2.amazonaws.com ]
            Action: [ sts:AssumeRole ]
      ManagedPolicyArns: [ arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy ]
      RoleName: !Sub
        - "Role-${ApplicationName}-${EnvType}"
        - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
      Path: "/"

  Profile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [ !Ref Role ]
      InstanceProfileName: !Sub
        - "InstanceProfile-${ApplicationName}-${EnvType}"
        - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      KeyName: !Ref KeyName
      SecurityGroupIds: [ !Ref SecurityGroup ]
      ImageId: !Ref AmiId
      InstanceType: !FindInMap [ InstanceMap, !Ref EnvType, Type ]
      AvailabilityZone: !FindInMap [ RegionMap, !Ref AWS::Region, !Ref AZ ]
      IamInstanceProfile: !Ref Profile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          dnf update -y
          /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource Instance --configsets deploy --region ${AWS::Region}
      Tags:
        - Key: Project
          Value: !Ref "AWS::StackName"
        - Key: Environment
          Value: !Ref EnvType
        - Key: Capability
          Value: "Instance"

    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          deploy: [ setup, build, service, cloudwatch ]
        setup:
          packages:
            yum:
              git: []
              java-21-amazon-corretto: []
        build:
          sources:
            /opt/app: !FindInMap [ ConfigMap, Constants, SourceUrl ]
          commands:
            01_permisson:
              command: !Sub
                - "chmod +x ${BuildPath}/mvnw || true"
                - {
                    BuildPath: !FindInMap [ ConfigMap, Constants, InstallPath ]
                  }
            02_build:
              sources:
                /opt/app: !FindInMap [ConfigMap, Constants, SourceUrl]
              commands:
                01_permisson:
                  command: !Sub
                    - "chmod +x ${BuildPath}/mvnw || true"
                    - BuildPath: !FindInMap [ConfigMap, Constants, SourceCodeDir]
                02_build:
                  command: !Sub
                    - "export HOME=/root && cd ${BuildPath} && ./mvnw clean package -Dbuild.finalName=${FinalName}"
                    - BuildPath: !FindInMap [ConfigMap, Constants, SourceCodeDir]
                      FinalName: !FindInMap [ConfigMap, Constants, ApplicationName]
        service:
          files:
            /etc/systemd/system/gallery.service:
              content: !Sub
                - |
                  [Unit]
                  Description=Gallery Service
                  After=network.target
                  
                  [Service]
                  Type=simple
                  WorkingDirectory=${InstallPath}
                  ExecStart=/usr/bin/java -jar ${InstallPath}/${ApplicationName}.jar --spring.profiles.active=${EnvType}
                  Restart=always
                  User=root
                  Group=root
                  StandardOutput=journal
                  StandardError=journal
                  
                  [Install]
                  WantedBy=multi-user.target
                - InstallPath: !Sub [ "${BuildPath}/target", { BuildPath: !FindInMap [ ConfigMap, Constants, SourceCodeDir ] } ]
                  ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
              mode: "000644"
              owner: root
              group: root
          services:
            systemd:
              gallery:
                enabled: true
                ensureRunning: true
        cloudwatch:
          packages:
            yum:
              amazon-cloudwatch-agent: [ ]
          files:
            /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json:
              content: !Sub
                - |
                  {
                    "logs": {
                      "logs_collected": {
                        "files": {
                          "collect_list": [
                            {
                              "file_path": "${InstallPath}/${LogFileName}",
                              "log_group_name": "${LogGroupName}",
                              "log_stream_name": "{instance_id}",
                              "timestamp_format": "%Y-%m-%d %H:%M:%S"
                            }
                          ]
                        }
                      }
                    },
                    "metrics": {
                      "append_dimensions": {
                        "InstanceId": "{instance_id}"
                      },
                      "metrics_collected": {
                        "cpu": {
                          "measurement": ["cpu_usage_idle", "cpu_usage_iowait", "cpu_usage_user", "cpu_usage_system"],
                          "metrics_collection_interval": 60,
                          "totalcpu": true
                        },
                        "mem": {
                          "measurement": ["mem_used_percent"],
                          "metrics_collection_interval": 60
                        },
                        "disk": {
                          "measurement": ["disk_used_percent", "disk_total"],
                          "metrics_collection_interval": 60,
                          "resources": ["/"]
                        },
                        "net": {
                          "measurement": ["bytes_sent", "bytes_recv", "packets_sent", "packets_recv"],
                          "metrics_collection_interval": 60
                        }
                      },
                      "namespace": "${SystemMetricsNameSpace}"
                    }                  
                  }
                - InstallPath: !Sub
                    - "${BuildPath}/target"
                    - BuildPath: !FindInMap [ ConfigMap, Constants, SourceCodeDir ]
                  LogFileName: !Sub
                    - "logs/${ApplicationName}.log"
                    - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
                  LogGroupName: !Sub
                    - "/${ApplicationNameReplace}/${EnvType}"
                    - ApplicationNameReplace: !Join [ "/", !Split [ "-", !FindInMap [ ConfigMap, Constants, ApplicationName ] ] ]
                      EnvType: !Ref EnvType
                  SystemMetricsNameSpace: !Sub
                    - "${ApplicationName}/metrics/system"
                    - ApplicationName: !FindInMap [ ConfigMap, Constants, ApplicationName ]
              mode: "000644"
              owner: root
              group: root
          services:
            systemd:
              amazon-cloudwatch-agent:
                enabled: true
                ensureRunning: true
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  InstanceType:
    Description: Instance Type Selected
    Value: !FindInMap [ InstanceMap, !Ref EnvType, Type ]

  AvailabilityZone:
    Description: Availability Zone on Region
    Value: !FindInMap [ RegionMap, !Ref AWS::Region, !Ref AZ ]

  SSHCommand:
    Description: SSH Command
    Value: !Sub "ssh -i ${KeyName}.pem ec2-user@${Instance.PublicDnsName}"

  ApplicationURL:
    Description: Gallery Application URL (Public DNS + Dynamic Port)
    Value: !Sub
      - "http://${DNS_NAME}:${PORT_NUMBER}"
      - DNS_NAME: !GetAtt Instance.PublicDnsName
        PORT_NUMBER: !If [ IIsDevelopmentEnv, "8080", "80" ]