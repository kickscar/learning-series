name: 09.05 lab01 Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths: ["Cloud/Terraform Core/09 코드 품질 & 배포 자동화/05 IaC 워크플로우/lab01/*.tf"]

env:
  TF_VERSION: "1.14.7"
  WORKING_DIR: "Cloud/Terraform Core/09 코드 품질 & 배포 자동화/05 IaC 워크플로우/lab01"

jobs:
  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}  
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
