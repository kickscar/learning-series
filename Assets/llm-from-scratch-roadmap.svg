<svg viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LLM from Scratch — 4년 커리큘럼 로드맵 (의존성 포함)</title>
<desc>1학년부터 4학년까지 4개 트랙 12개 시리즈와 트랙 간 핵심 의존성을 표시한 로드맵</desc>

<defs>
<marker id="dep-arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
  <path d="M0 0 L7 3.5 L0 7 Z" fill="#475569" />
</marker>
</defs>

<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
.h1 { fill: #0f172a; font-weight: 700; font-size: 22px; }
.h2 { fill: #64748b; font-size: 14px; }
.year { fill: #334155; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
.sem { fill: #94a3b8; font-size: 11px; font-weight: 600; }
.track { fill: #1e293b; font-weight: 700; font-size: 13px; }
.track-sub { fill: #94a3b8; font-size: 10px; }
.cn { fill: #fff; font-weight: 800; font-size: 15px; }
.cnm { fill: #fff; font-size: 11px; font-weight: 600; }
.grid { stroke: #e2e8f0; stroke-width: 0.6; }
.gridv { stroke: #cbd5e1; stroke-width: 0.8; }
.own { fill: #c2410c; }
.cap { fill: #0e7490; }
.dep { stroke: #475569; stroke-width: 1.4; fill: none; opacity: 0.55; }
.leg { fill: #64748b; font-size: 11px; }
</style>

<text x="40" y="30" class="h1">LLM from Scratch</text>
<text x="220" y="30" class="h2">— 4-Year Curriculum Roadmap with Dependencies</text>

<line x1="130" y1="42" x2="130" y2="430" class="gridv" />
<line x1="342" y1="42" x2="342" y2="430" class="gridv" />
<line x1="554" y1="42" x2="554" y2="430" class="gridv" />
<line x1="766" y1="42" x2="766" y2="430" class="gridv" />
<line x1="978" y1="42" x2="978" y2="430" class="gridv" />

<text x="236" y="58" class="year" text-anchor="middle">YEAR 1</text>
<text x="448" y="58" class="year" text-anchor="middle">YEAR 2</text>
<text x="660" y="58" class="year" text-anchor="middle">YEAR 3</text>
<text x="872" y="58" class="year" text-anchor="middle">YEAR 4</text>

<text x="183" y="76" class="sem" text-anchor="middle">1-1</text>
<text x="289" y="76" class="sem" text-anchor="middle">1-2</text>
<text x="395" y="76" class="sem" text-anchor="middle">2-1</text>
<text x="501" y="76" class="sem" text-anchor="middle">2-2</text>
<text x="607" y="76" class="sem" text-anchor="middle">3-1</text>
<text x="713" y="76" class="sem" text-anchor="middle">3-2</text>
<text x="819" y="76" class="sem" text-anchor="middle">4-1</text>
<text x="925" y="76" class="sem" text-anchor="middle">4-2</text>

<line x1="0" y1="86" x2="980" y2="86" class="grid" />
<line x1="0" y1="148" x2="980" y2="148" class="grid" />
<line x1="0" y1="210" x2="980" y2="210" class="grid" />
<line x1="0" y1="272" x2="980" y2="272" class="grid" />
<line x1="0" y1="334" x2="980" y2="334" class="grid" />
<line x1="0" y1="412" x2="980" y2="412" class="grid" />

<text x="120" y="115" class="track" text-anchor="end">Math</text>
<text x="120" y="129" class="track-sub" text-anchor="end">외부 강의 (선수)</text>
<text x="120" y="177" class="track" text-anchor="end">Deep Learning</text>
<text x="120" y="191" class="track-sub" text-anchor="end">이론 (scratch)</text>
<text x="120" y="239" class="track" text-anchor="end">AI Systems</text>
<text x="120" y="253" class="track-sub" text-anchor="end">엔지니어링</text>
<text x="120" y="301" class="track" text-anchor="end">LLM Core</text>
<text x="120" y="315" class="track-sub" text-anchor="end">전문화</text>
<text x="120" y="370" class="track" text-anchor="end">Applied LLM</text>
<text x="120" y="384" class="track-sub" text-anchor="end">응용</text>

<g transform="translate(138, 95)"><rect width="90" height="46" rx="7" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4 3"/><text x="45" y="22" font-size="11" fill="#94a3b8" text-anchor="middle">선수지식</text><text x="45" y="38" font-size="10" fill="#94a3b8" text-anchor="middle">(외부 강의)</text></g>

<g transform="translate(244, 157)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">①</text><text x="45" y="38" class="cnm" text-anchor="middle">Foundations</text></g>
<g transform="translate(350, 157)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">②</text><text x="45" y="38" class="cnm" text-anchor="middle">Sequences</text></g>
<g transform="translate(456, 157)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">③</text><text x="45" y="38" class="cnm" text-anchor="middle">Decisions</text></g>

<g transform="translate(456, 219)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">④</text><text x="45" y="38" class="cnm" text-anchor="middle">Engineering</text></g>
<g transform="translate(562, 219)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑤</text><text x="45" y="38" class="cnm" text-anchor="middle">Scale</text></g>
<g transform="translate(668, 219)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑥</text><text x="45" y="38" class="cnm" text-anchor="middle">Performance</text></g>

<g transform="translate(562, 281)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑦</text><text x="45" y="38" class="cnm" text-anchor="middle">Pretraining</text></g>
<g transform="translate(668, 281)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑧</text><text x="45" y="38" class="cnm" text-anchor="middle">Alignment</text></g>
<g transform="translate(774, 281)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑨</text><text x="45" y="38" class="cnm" text-anchor="middle">Operations</text></g>

<g transform="translate(774, 345)"><rect width="90" height="46" rx="7" class="own"/><text x="45" y="20" class="cn" text-anchor="middle">⑩</text><text x="45" y="38" class="cnm" text-anchor="middle">RAG</text></g>
<g transform="translate(880, 342)"><rect width="90" height="24" rx="5" class="own"/><text x="14" y="17" class="cn" text-anchor="middle" font-size="13">⑪</text><text x="58" y="17" class="cnm" text-anchor="middle" font-size="11">Agents</text></g>
<g transform="translate(880, 370)"><rect width="90" height="24" rx="5" class="own"/><text x="14" y="17" class="cn" text-anchor="middle" font-size="13">⑫</text><text x="58" y="17" class="cnm" text-anchor="middle" font-size="11">Multimodal</text></g>

<g marker-end="url(#dep-arr)">
  <path class="dep" d="M 440 180 Q 510 240 564 285" />
  <path class="dep" d="M 546 180 Q 620 240 668 285" />
  <path class="dep" d="M 546 254 Q 558 264 564 281" />
  <path class="dep" d="M 607 265 L 607 278" />
  <path class="dep" d="M 758 250 Q 770 268 776 281" />
  <path class="dep" d="M 652 320 Q 720 340 776 348" />
</g>

<g transform="translate(138, 420)">
  <rect width="840" height="36" rx="8" fill="#0e7490" opacity="0.12"/>
  <rect width="840" height="36" rx="8" fill="none" stroke="#0e7490" stroke-width="1.5"/>
  <text x="420" y="23" fill="#0e7490" font-size="13" font-weight="700" text-anchor="middle">🎓 Capstone — Build &amp; Serve Your Mini LLM (4학년 통합)</text>
</g>

<g transform="translate(40, 500)">
  <rect width="16" height="16" rx="4" class="own"/>
  <text x="24" y="13" class="leg">시리즈 (12권)</text>

  <g transform="translate(150, 0)">
    <rect width="16" height="16" rx="4" fill="none" stroke="#cbd5e1" stroke-dasharray="4 3"/>
    <text x="24" y="13" class="leg">선수지식 (외부)</text>
  </g>

  <g transform="translate(310, 0)">
    <rect width="16" height="16" rx="4" fill="#0e7490" opacity="0.15" stroke="#0e7490" stroke-width="1.5"/>
    <text x="24" y="13" class="leg">Capstone</text>
  </g>

  <g transform="translate(420, 6)">
    <line x1="0" y1="3" x2="32" y2="3" class="dep" marker-end="url(#dep-arr)"/>
    <text x="42" y="7" class="leg">트랙 간 핵심 의존성</text>
  </g>
</g>

<text x="40" y="555" class="leg">같은 트랙 안은 좌→우 순차. 트랙 간 의존성만 화살표로 표시. 학생은 한 학기 1~2 시리즈를 선택적으로 학습 가능.</text>
<text x="40" y="575" class="leg" font-style="italic" opacity="0.7">예: ⑦ Pretraining은 ② Sequences(Transformer) + ④ Engineering(PyTorch) + ⑤ Scale(분산학습)을 모두 선행으로 요구한다.</text>

</svg>
