<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<title>gallery</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<link th:href="@{/assets/css/gallery.css}" rel="stylesheet" type="text/css">
<link th:href="@{/assets/css/lightbox.css}" rel="stylesheet" type="text/css">
<link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
<script src="https://code.jquery.com/jquery-3.6.2.js" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script type="text/javascript" th:src="@{/assets/js/lightbox.js}"></script>
</head>
<body>
    <div id="container">
        <div id="content">
            <div id="gallery">
                <div>
                    <h1>Gallery</h1>
                    <a href="" id="upload-image">이미지 올리기</a>
                </div>
                <ul>
                    <li th:each="item, status:${items}">
                        <a th:href="@{${item.url}}"
                           class="image"
                           data-lightbox="gallery"
                           th:style="|background-image:url(@{${item.url}})|">&nbsp;</a>
                        <a th:href="@{|/${item.id}/delete|}" class="del-button" title="삭제">삭제</a>
                    </li>
                </ul>
            </div>
            <div id="dialog-upload-form" title="이미지 업로드" style="display: none">
                <p class="validateTips normal">이미지와 간단한 코멘트를 입력해 주세요.</p>
                <form action="/new" method="post" enctype="multipart/form-data">
                    <label for="input-comments">코멘트</label>
                    <input type="text" id="input-comments" name="comment" value="">
                    <label>이미지</label>
                    <input type="file" id="input-file" name="file">
                    <input type="submit" tabindex="-1" style="position: absolute; top: -1000px">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
<script type="text/javascript">
    $(function(){
        const dialogUpload = $("#dialog-upload-form").dialog({
            autoOpen: false,
            height: 280,
            width: 300,
            modal: true,
            buttons: {
                "업로드": () => {
                    $("#dialog-upload-form form").submit();
                    dialogUpload.dialog("close");
                },
                "취소": () => {
                    dialogUpload.dialog("close");
                }
            },
            close: () => {
                $("#dialog-upload-form form").get(0).reset();
            }
        });

        $("#upload-image").click(e => {
            e.preventDefault();
            dialogUpload.dialog("open");
        });
    });
</script>
